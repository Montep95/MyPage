<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta property="og:title" content="Gnob 프로필 링크" />
        <meta property="og:description" content="백엔드 개발자 '노봉준'입니다." />
        <meta property="og:image" content="공유할 이미지" />
        <title>Gnob 프로필 링크</title>

        <style>
            @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
            * {
                font-family: "Pretendard",serif;
            }

            body{
                background-color: #44398A;
            }

            .profile{
                width: 100px;
                height: 100px;
                border-radius: 100%;
                border:2px solid white;
                
                background-image: url('myprofile.png');
                background-position: center;
                background-size:cover;
            }

            .main{
                color:white;
                font-size:20px;
                margin-top:30px;
                margin-bottom:10px;
            }

            .sub{
                color:white;
                font-size: 14px;
                margin-top:0px;
            }

            .wrap{
                width: 300px;
                margin:30px auto 0px auto; /** 위 우측 밑 좌측 (시계방향) **/
                 
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
            }

            .wrap > a{
                width:300px;
                height:50px;

                background-color: white;
                border-radius: 8px;

                margin-bottom:10px;

                font-size:14px;
                font-weight: bold;
                color:#44398A;

                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                
                text-decoration : none;

                box-shadow: 3px 3px 5px 0px black; /**우측, 밑, 꼬리, 꼬리의 선명도**/
            }

            .wrap > a:hover{
                background-color: #f2f2f2;
                font-size:16px;
            }

        </style>

    </head>
    <body>
        <div class="wrap">
            <div class="profile"></div>
            <h1 class="main">Gnob</h1>
            <p class="sub">안녕하세요, 저는 Java, Android 개발자 입니다!</p>
                    
            <a target="_blank" href="https://lefton.tistory.com/">Gnob's Blog</a>
            <a target="_blank" href="https://github.com/Montep95">Gnob's Github</a>
            <a target="_blank" href="https://www.instagram.com/bongzur_">Instagram</a>
            <a target="_blank" href="http://gnob.shop/">Gnob's Project</a>
        </div>
        
    </body>
</html>
